  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080707;
      --bg-card:    #131110;
      --border:     rgba(255,245,235,0.08);
      --border-h:   #25D366;
      --surface:    rgba(255,245,235,0.04);
      --surface-h:  rgba(255,245,235,0.07);
      --gold:       #C9A84C;
      --gold-light: #E8C87A;
      --gold-dim:   rgba(201,168,76,0.15);
      --text:       #F2EDE4;
      --text-muted: rgba(242,237,228,0.55);
      --wa:         #25D366;
      --font-h:     'Montserrat', sans-serif;
      --font-d:     'Cormorant Garamond', serif;
      --radius:     16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-h);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .page {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }
    .header__logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 10px;
    }
    .header__name {
      font-family: var(--font-d);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .header__sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      align-self: flex-start;
      padding-left: 2px;
    }

    /* ── Contact cards ── */
    .contacts {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.125rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .contact-card:hover,
    .contact-card:focus-visible {
      border-color: var(--wa);
      background: var(--surface-h);
      transform: translateY(-2px);
      outline: none;
    }

    .contact-card__avatar {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: var(--font-h);
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-card__info {
      flex: 1;
    }
    .contact-card__name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .contact-card__cta {
      font-size: 0.75rem;
      color: var(--wa);
      margin-top: 2px;
    }

    .contact-card__wa {
      color: var(--wa);
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .contact-card__wa svg { width: 24px; height: 24px; }

    /* ── Footer ── */
    .footer {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
    }
    .footer a {
      color: var(--gold);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
