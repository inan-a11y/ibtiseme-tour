name: Refresh Google Reviews

on:
  schedule:
    - cron: '0 6 * * 1'   # Elke maandag om 06:00 UTC
  workflow_dispatch:        # Ook handmatig te starten via GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node fetch-reviews.js

      - name: Commit & push als er iets veranderd is
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews*.json
          if git diff --cached --quiet; then
            echo "Geen nieuwe reviews — niets te committen."
          else
            git commit -m "chore: Google reviews bijgewerkt (automatisch)"
            git push
          fi
