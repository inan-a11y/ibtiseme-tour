<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Ibtiseme Tour</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #080707;
      --bg2:     #0D0B0A;
      --card:    #131110;
      --border:  rgba(255,245,235,0.08);
      --gold:    #C9A84C;
      --cobalt:  #2563EB;
      --text:    #F2EDE4;
      --muted:   rgba(242,237,228,0.55);
      --subtle:  rgba(242,237,228,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      margin-bottom: 3rem;
    }

    .logo__star {
      color: var(--gold);
      font-size: 1rem;
    }

    .logo__text {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo__text em {
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
    }

    /* 404 number */
    .err-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(7rem, 20vw, 11rem);
      font-weight: 300;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(201,168,76,0.35);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      user-select: none;
    }

    .err-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .err-title em {
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
    }

    .err-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 2.5rem;
    }

    /* Divider */
    .err-divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.4;
      margin: 0 auto 2.5rem;
    }

    /* Actions */
    .err-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 200ms, transform 150ms, border-color 200ms;
      cursor: pointer;
    }

    .btn:active { transform: scale(0.97); }

    .btn--cobalt {
      background: var(--cobalt);
      color: #fff;
      border: 1px solid transparent;
    }

    .btn--cobalt:hover { background: #1D4ED8; }

    .btn--ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn--ghost:hover { border-color: rgba(201,168,76,0.45); color: var(--gold); }

    /* Note */
    .err-note {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: var(--subtle);
    }
  </style>
</head>
<body>

  <div class="wrap">

    <a href="index.html" class="logo" aria-label="Ibtiseme Tour – Home">
      <span class="logo__star">&#10022;</span>
      <span class="logo__text">Ibtiseme <em>Tour</em></span>
    </a>

    <div class="err-number" aria-hidden="true">404</div>

    <h1 class="err-title">Page <em>Not Found</em></h1>

    <div class="err-divider" aria-hidden="true"></div>

    <p class="err-desc">
      The page you're looking for doesn't exist or has been moved.
      Our team is ready to help you plan your journey to Turkey.
    </p>

    <div class="err-actions">
      <a href="index.html" class="btn btn--cobalt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="https://wa.me/905076249157?text=Hello%2C%20I%27d%20like%20to%20enquire%20about%20travel%20to%20Turkey." class="btn btn--ghost" target="_blank" rel="noopener noreferrer">
        <svg width="14" height="14" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.45.644 4.75 1.77 6.736L2 30l7.45-1.74A13.94 13.94 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2Z" fill="currentColor"/><path d="M22.5 19.5c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.17-.17.2-.35.22-.65.07-.3-.15-1.27-.47-2.42-1.5-.9-.8-1.5-1.79-1.68-2.09-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51-.17 0-.37-.02-.57-.02s-.52.07-.8.37c-.27.3-1.04 1.02-1.04 2.48 0 1.47 1.07 2.88 1.22 3.08.15.2 2.1 3.2 5.08 4.49.71.3 1.26.48 1.69.62.71.22 1.36.19 1.87.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35Z" fill="#fff"/></svg>
        WhatsApp Us
      </a>
    </div>

    <p class="err-note">ibtisemetour.com &mdash; Istanbul, Turkey</p>

  </div>

</body>
</html>
